<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --cream: #f5f0e8;
      --glow: rgba(201, 168, 76, 0.35);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* Fondo de partículas */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Gradiente radial de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
      z-index: 0;
      animation: pulse-bg 6s ease-in-out infinite;
    }

    @keyframes pulse-bg {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .scene {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem;
    }

    /* Líneas decorativas */
    .lines {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fade-slide-up 1s ease forwards 0.3s;
    }

    .line {
      height: 1px;
      flex: 1;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .diamond {
      width: 8px; height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 12px var(--gold);
      animation: pulse-diamond 2s ease-in-out infinite;
    }

    @keyframes pulse-diamond {
      0%, 100% { box-shadow: 0 0 8px var(--gold); transform: rotate(45deg) scale(1); }
      50% { box-shadow: 0 0 20px var(--gold-light); transform: rotate(45deg) scale(1.3); }
    }

    /* Nombre Michelle */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite, fade-slide-up 1.2s ease forwards 0s;
      opacity: 0;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(201,168,76,0.5));
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Mensaje principal */
    .message-wrap {
      margin: 2rem 0;
      opacity: 0;
      animation: fade-slide-up 1s ease forwards 0.8s;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.3rem, 3.5vw, 2.2rem);
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.04em;
      line-height: 1.5;
      position: relative;
    }

    /* Efecto de escritura en el mensaje */
    .message span {
      display: inline;
      opacity: 0;
      animation: letter-show 0.05s ease forwards;
    }

    @keyframes letter-show {
      to { opacity: 1; }
    }

    /* Línea separadora inferior */
    .lines-bottom {
      margin-top: 2.4rem;
      opacity: 0;
      animation: fade-slide-up 1s ease forwards 1.4s;
    }

    /* Botón de llamada a acción */
    .cta {
      margin-top: 3rem;
      opacity: 0;
      animation: fade-slide-up 1s ease forwards 1.8s;
    }

    .cta-btn {
      display: inline-block;
      padding: 0.85rem 2.8rem;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      background: transparent;
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      z-index: -1;
    }

    .cta-btn:hover::before { transform: scaleX(1); }
    .cta-btn:hover { color: var(--bg); }

    /* Animación de entrada */
    @keyframes fade-slide-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Pequeñas estrellas decorativas */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--max-op); transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .scene { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="stars" id="stars"></div>

<div class="scene">
  <div class="lines">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <div class="name">Michelle</div>

  <div class="message-wrap">
    <p class="message" id="msg"></p>
  </div>

  <div class="lines-bottom lines">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>


</div>

<script>
  /* ── Partículas flotantes ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = H + 20;
      this.size = Math.random() * 1.8 + 0.4;
      this.speed = Math.random() * 0.5 + 0.2;
      this.opacity = Math.random() * 0.5 + 0.2;
      this.dx = (Math.random() - 0.5) * 0.4;
    }
    update() {
      this.y -= this.speed;
      this.x += this.dx;
      if (this.y < -10) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) {
    const p = new Particle();
    p.y = Math.random() * H;
    particles.push(p);
  }

  function animateParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  /* ── Estrellas estáticas ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*6).toFixed(1)}s;
      --max-op:${(Math.random()*0.6+0.2).toFixed(2)};
    `;
    starsEl.appendChild(s);
  }

  /* ── Efecto de escritura del mensaje ── */
  const text = 'dígame para yo confirmar';
  const msgEl = document.getElementById('msg');

  function typeMessage() {
    msgEl.innerHTML = '';
    [...text].forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.animationDelay = `${1.2 + i * 0.055}s`;
      msgEl.appendChild(span);
    });
  }

  function replay() {
    typeMessage();
  }

  typeMessage();
</script>
</body>
</html>
